llm:
  # Download model from Hugging Face before running:
  # https://huggingface.co/Qwen/Qwen2.5-7B-Instruct-1M-GGUF/blob/main/Qwen2.5-7B-Instruct-1M-Q4_K_M.gguf
  # Place it at: models/llm/Qwen2.5-7B-Instruct-1M-Q4_K_M.gguf
  model_path: models/llm/Qwen2.5-7B-Instruct-1M-Q4_K_M.gguf

  # Context window
  n_ctx: 4096

  # CPU threads (set = number of physical cores)
  n_threads: 8

  # Generation settings
  temperature: 0.7
  top_p: 0.9
  max_tokens: 512
